services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noorish
      POSTGRES_PASSWORD: noorish
      POSTGRES_DB: noorish
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noorish"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
